    baselinePath: teams.meeting_policy_global.allow_anonymous_users_to_join_meeting
    scanWorkload: teams
    scanPath: meetingPolicyGlobal.AllowAnonymousUsersToJoinMeeting
    compareMode: equals

  - id: teams.lobby-bypass-restricted
    workload: teams
    baselineControlId: m365.teams.lobby-bypass
    cisRef: 8.5.3
    frameworks: [{ framework: cis-m365, ref: 8.5.3 }]
    severity: medium
    baselinePath: teams.meeting_policy_global.auto_admitted_users
    scanWorkload: teams
    scanPath: meetingPolicyGlobal.AutoAdmittedUsers
    compareMode: equals

  - id: teams.federation-consumer-blocked
    workload: teams
    baselineControlId: m365.teams.unmanaged-blocked
    cisRef: 8.2.2
    frameworks: [{ framework: cis-m365, ref: 8.2.2 }]
    severity: medium
    baselinePath: teams.federation.allow_teams_consumer
    scanWorkload: teams
    scanPath: federation.AllowTeamsConsumer
    compareMode: equals

# =============================================================================
# Intune (CIS Section 4)
# =============================================================================

  - id: intune.non-compliant-by-default
    workload: intune
    baselineControlId: m365.intune.compliance.gate
    cisRef: 4.1
    frameworks:
      - { framework: cis-m365, ref: 4.1 }
      - { framework: hipaa,    ref: "§164.310(c)" }
    severity: high
    baselinePath: intune.non_compliant_by_default
    scanWorkload: intune
    # Heuristic: presence of at least one compliance policy + scope covering users.
    # Deeper check requires evaluating the tenant's built-in compliance gate flag
    # which currently requires beta API. Marked partial in v1.
    scanPath: compliancePolicies
    compareMode: presentAndNotEmpty

# =============================================================================
# Power BI (CIS Section 9)
# =============================================================================

  - id: powerbi.publish-to-web-restricted
    workload: powerbi
    baselineControlId: m365.powerbi.publish-to-web
    cisRef: 9.1.4
    frameworks: [{ framework: cis-m365, ref: 9.1.4 }]
    severity: medium
    baselinePath: powerbi.tenant_settings.publish_to_web
    scanWorkload: powerbi
    # The Power BI admin API returns an array of tenant settings; the rule
    # engine looks up by settingName.
    scanPath: tenantSettings.tenantSettings[settingName=PublishToWeb].enabled
    compareMode: tenantSettingDisabled

  - id: powerbi.guest-access-restricted
    workload: powerbi
    baselineControlId: m365.powerbi.guest-restricted
    cisRef: 9.1.1
    frameworks: [{ framework: cis-m365, ref: 9.1.1 }]
    severity: medium
    baselinePath: powerbi.tenant_settings.allow_guest_access
    scanWorkload: powerbi
    scanPath: tenantSettings.tenantSettings[settingName=AllowGuestUsersToSignIn].enabled
    compareMode: tenantSettingDisabled
