    compareMode: equals

  - id: sharepoint.default-link-permission
    workload: sharepoint
    baselineControlId: m365.sharepoint.default-link-permission
    cisRef: 7.2.11
    frameworks: [{ framework: cis-m365, ref: 7.2.11 }]
    severity: medium
    baselinePath: sharepoint.default_link_permission
